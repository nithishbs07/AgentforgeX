version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite databases and uploaded PDF storage
      - backend_storage:/workspace/storage
      - backend_db:/workspace/db
    environment:
      - DATABASE_URL=sqlite:////workspace/db/agentforge.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIRECTORY=/workspace/chroma_data
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - BACKEND_CORS_ORIGINS=["*"]
      - LOG_LEVEL=INFO
      - DEBUG=true
    extra_hosts:
      # Allow backend to access host-running Ollama on Windows/Linux
      - "host.docker.internal:host-gateway"
    depends_on:
      - chromadb
      - neo4j

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  chromadb:
    image: chromadb/chroma:0.5.0
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

  neo4j:
    image: neo4j:5.21.0-community
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password

volumes:
  backend_storage:
  backend_db:
  chroma_data:
  neo4j_data:
  neo4j_logs:
