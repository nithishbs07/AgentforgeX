# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, to search for modules.
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to truncate the migration character
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded
# relative to the current directory
# version_locations = %(here)s/bar

sqlalchemy.url = sqlite:///./agentforge.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
