version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: agentforge_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentforge_backend
    restart: unless-stopped
    volumes:
      - backend_storage:/workspace/storage
      - backend_db:/workspace/db
    environment:
      - DATABASE_URL=sqlite:////workspace/db/agentforge.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_PERSIST_DIRECTORY=/workspace/chroma_data
      - OLLAMA_BASE_URL=http://ollama:11434
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - BACKEND_CORS_ORIGINS=["*"]
      - LOG_LEVEL=INFO
      - DEBUG=false
      - USE_DEEP_RESEARCH=true
    depends_on:
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/monitoring/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentforge_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - backend

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: agentforge_chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5.21.0-community
    container_name: agentforge_neo4j
    restart: unless-stopped
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: agentforge_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

volumes:
  backend_storage:
  backend_db:
  chroma_data:
  neo4j_data:
  neo4j_logs:
  ollama_data:
